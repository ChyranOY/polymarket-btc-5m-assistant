name: Kronos daily

on:
  schedule:
    # 13:00 UTC = 06:00 PST (standard) / 05:00 PDT — just before the PST
    # trading window opens each day. Cron is UTC; DO redeploys are fine
    # to run alongside.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clone Kronos
        run: git clone --depth 1 https://github.com/shiyu-coder/Kronos third_party/Kronos

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: kronos-pip-${{ hashFiles('kronos_poc/requirements.txt') }}

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kronos-hf-v1

      - name: Install Python deps (CPU torch)
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r kronos_poc/requirements.txt

      - name: Run daily Kronos evaluation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KRONOS_PATH: ${{ github.workspace }}/third_party/Kronos
        run: python kronos_poc/daily_run.py --samples 20

      # Publish to an orphan `data` branch so the daily update does NOT
      # trigger a DigitalOcean redeploy (DO watches `main`). The dashboard
      # fetches from raw.githubusercontent.com.
      - name: Publish JSON to data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [[ ! -f static/kronos_daily.json ]]; then
            echo "no JSON produced"; exit 0
          fi
          mkdir /tmp/out
          cp static/kronos_daily.json /tmp/out/
          cd /tmp/out
          git init -q -b data
          git config user.name  "kronos-bot"
          git config user.email "kronos-bot@users.noreply.github.com"
          git add kronos_daily.json
          git commit -q -m "kronos daily $(date -u +%F)"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin data
